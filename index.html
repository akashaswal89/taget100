<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Balance</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef2f3, #8e9eab);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Heading */
h1 {
    text-align: center;
    margin-bottom: 15px;
    color: #333;
}

/* Balance Box */
.balance-display {
    text-align: center;
    margin-bottom: 20px;
    padding: 15px;
    background: #f0fff4;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 10px;
}

th {
    background: #4CAF50;
    color: white;
    padding: 12px;
    font-size: 14px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

/* Row hover */
tr:hover {
    background: #f5f5f5;
    cursor: pointer;
    transform: scale(1.01);
    transition: 0.2s;
}

/* Selected row */
tr.success {
    background: #d4edda !important;
}

/* Mobile */
@media (max-width: 600px) {
    td, th {
        font-size: 12px;
        padding: 8px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>📊 Your Balance System</h1>

    <div class="balance-display">
        Balance: <span id="balanceAmount" style="color:green;">₹0</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Step</th>
                <th>Amount (₹)</th>
                <th>Label Breakdown</th>
            </tr>
        </thead>

        <tbody id="balanceTable"></tbody>
    </table>

</div>

<script>
// Auto-generate 5% increment data starting from 100 to 30,000
const balanceData = [];

let amount = 100;
let day = 1;

while (amount <= 30000) {
    balanceData.push({
        day: day,
        amount: Math.floor(amount)
    });

    amount *= 1.05;
    day++;
}

function populateTable() {
    const tableBody = document.getElementById("balanceTable");

    balanceData.forEach((entry) => {

        const p2 = Math.floor(entry.amount * 0.02);
        const p4 = Math.floor(entry.amount * 0.04);
        const p5 = Math.floor(entry.amount * 0.05);

        const p10 = p5 * 2;
        const p20 = p10 * 2;
        const p40 = p20 * 2;

        const terms = [p2, p4, p5, p10, p20, p40];

        const total = terms.reduce((a, b) => a + b, 0);

        const labelText = `${terms.join(" + ")} = ₹${total}`;

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${entry.day}</td>
            <td>₹${entry.amount}</td>
            <td>${labelText}</td>
        `;

        row.addEventListener("click", () => updateBalance(entry.amount, row));

        tableBody.appendChild(row);
    });
}

function updateBalance(amount, row) {

    const balance = document.getElementById("balanceAmount");

    if (!row.classList.contains("success")) {
        balance.innerText = `₹${amount}`;
        row.classList.add("success");
    } else {
        balance.innerText = `₹0`;
        row.classList.remove("success");
    }
}

document.addEventListener("DOMContentLoaded", populateTable);
</script>

</body>
</html>
