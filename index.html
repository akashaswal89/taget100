<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Balance</title>
    <link rel="stylesheet" href="style.css">
</head>
    <style>
        










body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ddd;
}

tr.success {
    background-color: #d4edda;
}

tr:hover {
    background-color: #f1f1f1;
    cursor: pointer;
}

    </style>
<body>
    <div class="container">
        
        <h1>Your Balance</h1>
        <div class="balance-display">
            <h2 id="balance">Balance: <span style="color: green;">₹0.00</span></h2>

        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Step</th>
                    <th>Amount (₹)</th>
                    <th>label</th>
                </tr>
            </thead>
            <tbody id="balanceTable">
                <!-- Rows will be added here by JavaScript -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
